name: Build Android Screen Mask APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Create Clean Project Architecture
        run: |
          mkdir -p app/src/main/java/com/noxvix/screenmask
          mkdir -p app/src/main/res/layout

          cat << 'EOF' > settings.gradle
          rootProject.name = "ScreenMasker"
          include ":app"
          EOF

          cat << 'EOF' > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath "com.android.tools.build:gradle:8.2.2" }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat << 'EOF' > app/build.gradle
          apply plugin: "com.android.application"
          android {
              compileSdk 34
              namespace "com.noxvix.screenmask"
              defaultConfig {
                  applicationId "com.noxvix.screenmask"
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation "androidx.core:core:1.12.0"
              implementation "androidx.appcompat:appcompat:1.6.1"
          }
          EOF

          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.noxvix.screenmask">
              <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <application android:label="Screen Masker" android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <service android:name=".OverlayService" android:exported="false" />
              </application>
          </manifest>
          EOF

          cat << 'EOF' > app/src/main/java/com/noxvix/screenmask/MainActivity.java
          package com.noxvix.screenmask;
          import android.content.Intent;
          import android.net.Uri;
          import android.os.Build;
          import android.os.Bundle;
          import android.provider.Settings;
          import android.widget.Button;
          import android.widget.LinearLayout;
          import android.widget.TextView;
          import android.view.Gravity;
          import android.graphics.Color;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  LinearLayout layout = new LinearLayout(this);
                  layout.setOrientation(LinearLayout.VERTICAL);
                  layout.setGravity(Gravity.CENTER);
                  layout.setBackgroundColor(Color.parseColor("#121212"));

                  TextView text = new TextView(this);
                  text.setText("Screen Masker");
                  text.setTextColor(Color.WHITE);
                  text.setTextSize(24f);
                  text.setPadding(0, 0, 0, 50);

                  Button btnStart = new Button(this);
                  btnStart.setText("Enable Mask");
                  btnStart.setOnClickListener(v -> {
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M && !Settings.canDrawOverlays(this)) {
                          startActivityForResult(new Intent(Settings.ACTION_MANAGE_OVERLAY_PERMISSION, Uri.parse("package:" + getPackageName())), 101);
                      } else {
                          if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                              startForegroundService(new Intent(this, OverlayService.class));
                          } else {
                              startService(new Intent(this, OverlayService.class));
                          }
                      }
                  });

                  Button
