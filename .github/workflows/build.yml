name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create and Build Android 16 Project
        run: |
          mkdir -p app/src/main/java/com/noxvix/screenmask app/src/main/res/layout
          echo 'include ":app"' > settings.gradle
          echo 'buildscript { repositories { google(); mavenCentral() } ; dependencies { classpath "com.android.tools.build:gradle:8.2.2" } } ; allprojects { repositories { google(); mavenCentral() } }' > build.gradle
          echo 'apply plugin: "com.android.application" ; android { compileSdk 35 ; namespace "com.noxvix.screenmask" ; defaultConfig { minSdk 26 ; targetSdk 35 } ; compileOptions { sourceCompatibility JavaVersion.VERSION_17 ; targetCompatibility JavaVersion.VERSION_17 } }' > app/build.gradle
          echo '<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.noxvix.screenmask"><uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW"/><uses-permission android:name="android.permission.FOREGROUND_SERVICE"/><uses-permission android:name="android.permission.FOREGROUND_SERVICE_SPECIAL_USE"/><application android:label="Masker"><activity android:name=".MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter></activity><service android:name=".OverlayService" android:exported="false" android:foregroundServiceType="specialUse"><property android:name="android.app.PROPERTY_SPECIAL_USE_FGS_SUBTYPE" android:value="ScreenMask"/></service></application></manifest>' > app/src/main/AndroidManifest.xml
          echo 'package com.noxvix.screenmask; import android.app.Activity; import android.content.Intent; import android.content.SharedPreferences; import android.graphics.Color; import android.net.Uri; import android.os.Build; import android.os.Bundle; import android.provider.Settings; import android.widget.Button; import android.widget.LinearLayout; import android.widget.SeekBar; import android.widget.TextView; public class MainActivity extends Activity { SharedPreferences pr; @Override protected void onCreate(Bundle b) { super.onCreate(b); pr = getSharedPreferences("P", 0); LinearLayout l = new LinearLayout(this); l.setOrientation(LinearLayout.VERTICAL); l.setPadding(50, 100, 50, 50); l.setBackgroundColor(Color.parseColor("#121212")); TextView t = new TextView(this); t.setText("Mask Width: " + pr.getInt("w", 35) + "px"); t.setTextColor(Color.WHITE); t.setTextSize(20f); SeekBar s = new SeekBar(this); s.setMax(150); s.setProgress(pr.getInt("w", 35)); s.setOnSeekBarChangeListener(new SeekBar.OnSeekBarChangeListener() { public void onProgressChanged(SeekBar sb, int p, boolean f) { t.setText("Mask Width: " + p + "px"); pr.edit().putInt("w", p).apply(); Intent i = new Intent(MainActivity.this, OverlayService.class); i.putExtra("w", p); if(Build.VERSION.SDK_INT >= 26) { startForegroundService(i); } else { startService(i); } } public void onStartTrackingTouch(SeekBar sb) {} public void onStopTrackingTouch(SeekBar sb) {} }); Button st = new Button(this); st.setText("Enable Mask"); st.setOnClickListener(v -> { if(Build.VERSION.SDK_INT >= 23 && !Settings.canDrawOverlays(this)) { startActivityForResult(new Intent(Settings.ACTION_MANAGE_OVERLAY_PERMISSION, Uri.parse("package:" + getPackageName())), 1); } else { Intent i = new Intent(this, OverlayService.class); i.putExtra("w", pr.getInt("w", 35)); if(Build.VERSION.SDK_INT >= 26) { startForegroundService(i); } else { startService(i); } } }); Button off = new Button(this); off.setText("Turn Off Mask"); off.setOnClickListener(v -> stopService(new Intent(this, OverlayService.class))); l.addView(t); l.addView(s); l.addView(st); l.addView(off); setContentView(l); } }' > app/src/main/java/com/noxvix/screenmask/MainActivity.java
          echo 'package com.noxvix.screenmask; import android.app.*; import android.content.Intent; import android.content.SharedPreferences; import android.graphics.*; import android.os.*; import android.view.*; public class OverlayService extends Service { View m; WindowManager w; WindowManager.LayoutParams p; @Override public void onCreate() { super.onCreate(); w = (WindowManager)getSystemService(WINDOW_SERVICE); p = new WindowManager.LayoutParams(35, WindowManager.LayoutParams.MATCH_PARENT, Build.VERSION.SDK_INT >= 26 ? 2038 : 2002, 280, PixelFormat.OPAQUE); p.gravity = Gravity.START | Gravity.TOP; p.alpha = 1.0f; m = new View(this); m.setBackgroundColor(Color.BLACK); w.addView(m, p); if(Build.VERSION.SDK_INT >= 26) { NotificationChannel c = new NotificationChannel("C", "M", NotificationManager.IMPORTANCE_LOW); ((NotificationManager)getSystemService(NOTIFICATION_SERVICE)).createNotificationChannel(c); Notification n = new Notification.Builder(this, "C").setSmallIcon(android.R.drawable.ic_dialog_info).build(); if(Build.VERSION.SDK_INT >= 34) { startForeground(1, n, 1073741824); /* FOREGROUND_SERVICE_TYPE_SPECIAL_USE */ } else { startForeground(1, n); } } } @Override public int onStartCommand(Intent i, int f, int id) { int wid = 35; if(i != null && i.hasExtra("w")) { wid = i.getIntExtra("w", 35); } else { wid = getSharedPreferences("P", 0).getInt("w", 35); } p.width = wid > 0 ? wid : 1; if(m != null) w.updateViewLayout(m, p); return START_STICKY; } @Override public IBinder onBind(Intent i) { return null; } @Override public void onDestroy() { super.onDestroy(); if(m != null) w.removeView(m); } }' > app/src/main/java/com/noxvix/screenmask/OverlayService.java
          gradle wrapper --gradle-version 8.2 --distribution-type bin
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: screen-masker-apk
          path: app/build/outputs/apk/debug/app-debug.apk
