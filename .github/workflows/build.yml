name: Build Android Screen Mask APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Inject Complete Android Project Architecture
        run: |
          # 1. Clear out legacy setup variants
          rm -f settings.gradle.kts build.gradle.kts app/build.gradle.kts settings.gradle build.gradle app/build.gradle
          
          # 2. Build explicit project structure folders
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/java/com/noxvix/screenmask
          
          # 3. Download official Gradle Wrapper binaries directly into the compiler
          gradle wrapper --gradle-version 8.2 --distribution-type bin
          
          # 4. Generate core layout parameters
          echo 'rootProject.name = "ScreenMasker"' > settings.gradle
          echo 'include ":app"' >> settings.gradle
          
          echo 'buildscript { repositories { google(); mavenCentral() }; dependencies { classpath "com.android.tools.build:gradle:8.2.2"; classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.8.22" } }' > build.gradle
          echo 'allprojects { repositories { google(); mavenCentral() } }' >> build.gradle
          
          # 5. Build isolated application target manifest
          echo 'apply plugin: "com.android.application"' > app/build.gradle
          echo 'apply plugin: "kotlin-android"' >> app/build.gradle
          echo 'android { compileSdk 34; namespace "com.noxvix.screenmask"; defaultConfig { applicationId "com.noxvix.screenmask"; minSdk 26; targetSdk 34; versionCode 1; versionName "1.0" }; buildTypes { release { minifyEnabled false } }; compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 } }' >> app/build.gradle
          echo 'dependencies { implementation "androidx.core:core-ktx:1.12.0"; implementation "androidx.appcompat:appcompat:1.6.1"; implementation "com.google.android.material:material:1.11.0" } text' >> app/build.gradle
          
          # 6. Apply system permission manifest layout
          echo '<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.github.com/apk/apk/res/android" package="com.noxvix.screenmask"><uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" /><uses-permission android:name="android.permission.FOREGROUND_SERVICE" /><application android:allowBackup="true" android:label="Screen Masker" android:theme="@style/Theme.AppCompat.Light.NoActionBar"><activity android:name=".MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter></activity><service android:name=".OverlayService" android:enabled="true" android:exported="false" /></application></manifest>' > app/src/main/AndroidManifest.xml
          
          # 7. Generate core background UI display logic
          echo 'package com.noxvix.screenmask; import android.content.Intent; import android.net.Uri; import android.os.Build; import android.os.Bundle; import android.provider.Settings; import android.widget.Button; import androidx.appcompat.app.AppCompatActivity; public class MainActivity extends AppCompatActivity { private final int REQ_CODE = 5469; @Override protected void onCreate(Bundle savedInstanceState) { super.onCreate(savedInstanceState); Button btn = new Button(this); btn.setText("Enable Screen Mask"); btn.setOnClickListener(v -> { if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M && !Settings.canDrawOverlays(this)) { startActivityForResult(new Intent(Settings.ACTION_MANAGE_OVERLAY_PERMISSION, Uri.parse("package:" + getPackageName())), REQ_CODE); } else { startService(new Intent(this, OverlayService.class)); } }); setContentView(btn); } }' > app/src/main/java/com/noxvix/screenmask/MainActivity.java

      - name: Compile Custom App Binary
        run: ./gradlew assembleDebug

      - name: Upload Custom Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: screen-masker-apk
          path: app/build/outputs/apk/debug/app-debug.apk
