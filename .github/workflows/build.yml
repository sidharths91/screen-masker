name: Build Android Screen Mask APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Missing Android Boilerplate Files
        run: |
          # 1. Create root gradle configs
          echo 'pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }; dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }; rootProject.name = "ScreenMasker"; include(":app")' > settings.gradle.kts
          echo 'plugins { id("com.android.application") version "8.2.2" apply false; id("org.jetbrains.kotlin.android") version "1.8.22" apply false }' > build.gradle.kts
          
          # 2. Create app level structure
          mkdir -p app/src/main/res/layout
          
          # 3. Create app build.gradle
          echo 'plugins { id("com.android.application"); id("org.jetbrains.kotlin.android") }; android { namespace = "com.noxvix.screenmask"; compileSdk = 34; defaultConfig { applicationId = "com.noxvix.screenmask"; minSdk = 26; targetSdk = 34; versionCode = 1; versionName = "1.0" }; buildTypes { release { isMinifyEnabled = false } }; compileOptions { sourceCompatibility = JavaVersion.VERSION_17; targetCompatibility = JavaVersion.VERSION_17 }; kotlinOptions { jvmTarget = "17" } }; dependencies { implementation("androidx.core:core-ktx:1.12.0"); implementation("androidx.appcompat:appcompat:1.6.1"); implementation("com.google.android.material:material:1.11.0") }' > app/build.gradle.kts
          
          # 4. Create AndroidManifest
          echo '<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.github.com/apk/apk/res/android" package="com.noxvix.screenmask"><uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" /><uses-permission android:name="android.permission.FOREGROUND_SERVICE" /><application android:allowBackup="true" android:label="Screen Masker" android:theme="@style/Theme.AppCompat.Light.NoActionBar"><activity android:name=".MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter></activity><service android:name=".OverlayService" android:enabled="true" android:exported="false" /></application></manifest>' > app/src/main/AndroidManifest.xml
          
          # 5. Create basic MainActivity launcher file
          echo 'package com.noxvix.screenmask; import android.content.Intent; import android.net.Uri; import android.os.Build; import android.os.Bundle; import android.provider.Settings; import android.widget.Button; import android.widget.Toast; import androidx.appcompat.app.AppCompatActivity; public class MainActivity extends AppCompatActivity { private final int REQ_CODE = 5469; override protected void onCreate(Bundle savedInstanceState) { super.onCreate(savedInstanceState); Button btn = new Button(this); btn.setText("Enable Screen Mask"); btn.setOnClickListener(v -> { if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M && !Settings.canDrawOverlays(this)) { startActivityForResult(new Intent(Settings.ACTION_MANAGE_OVERLAY_PERMISSION, Uri.parse("package:" + getPackageName())), REQ_CODE); } else { startService(new Intent(this, OverlayService.class)); } }); setContentView(btn); } }' > app/src/main/java/com/noxvix/screenmask/MainActivity.java

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: Compile Custom APK
        run: gradle assembleDebug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: screen-masker-apk
          path: app/build/outputs/apk/debug/app-debug.apk
